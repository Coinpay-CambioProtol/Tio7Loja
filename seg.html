<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tio 7 Sports | Loja Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CDN do EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --ouro: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        
        /* Menu Superior */
        .navbar { background: #000; border-bottom: 2px solid var(--ouro); padding: 15px 0; }
        .nav-link { color: #fff !important; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-link:hover { color: var(--ouro) !important; }
        .dropdown-menu { background-color: #111; border: 1px solid var(--ouro); }
        .dropdown-item { color: #fff; font-weight: 500; transition: 0.3s; }
        .dropdown-item:hover { background-color: var(--ouro); color: #000; }
        .navbar-toggler { border-color: var(--ouro); color: var(--ouro); }
        
        /* Cards de Produtos */
        .card-produto { background: #111; border: 1px solid #333; border-radius: 15px; transition: 0.4s; cursor: pointer; position: relative; }
        .card-produto:hover { border-color: var(--ouro); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .btn-gold { background: var(--ouro); color: #000; font-weight: 800; border: none; }
        .btn-gold:hover { background: #b5952f; color: #000; }
        
        /* Filtros Rápidos */
        .nav-pills .nav-link-pill { color: #fff; cursor: pointer; font-weight: 600; padding: 8px 16px; border-radius: 20px; transition: 0.3s; }
        .nav-pills .nav-link-pill.active { background: var(--ouro); color: #000; }
        
        .modal-content { background: #151515; border: 2px solid var(--ouro); color: white; }
        .resumo-valor { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--ouro); border-radius: 8px; }

        /* Estilo das Etiquetas de Dados */
        .label-ouro { color: var(--ouro); font-size: 13px; font-weight: 600; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Painel ADM Autenticado */
        .btn-editar { display: none; position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; z-index: 10; font-size: 12px; }
        .modo-adm .btn-editar { display: block; }
        .barra-adm { display: none; background: #dc3545; color: white; text-align: center; padding: 10px; font-weight: bold; }
        .modo-adm .barra-adm { display: block; }
    </style>
</head>
<body id="body-principal">

<div class="barra-adm"><i class="fas fa-shield-alt"></i> MODO ADMINISTRADOR ATIVADO</div>

<!-- Menu Superior -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="#adm">
            TIO 7 <span style="color:var(--ouro)">SPORTS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="#" onclick="filtrarCat('todos')">Início</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Catálogo</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#" onclick="filtrarCat('brasileiros')">Brasileiros</a></li>
                        <li><a class="dropdown-item" href="#" onclick="filtrarCat('europeus')">Europeus</a></li>
                        <li><a class="dropdown-item" href="#" onclick="filtrarCat('selecoes')">Seleções</a></li>
                    </ul>
                </li>
            </ul>
            <span class="badge bg-success py-2 px-3 fw-bold fs-6">Varejo Direto</span>
        </div>
    </div>
</nav>

<div class="container py-4">
    <input type="text" id="busca" class="form-control bg-dark text-white border-0 mb-4 py-3" placeholder="🔍 Buscar manto..." onkeyup="filtrar()">
    
    <nav class="nav nav-pills justify-content-center mb-5 gap-2">
        <a class="nav-link-pill active" onclick="filtrarCat('todos', this)">TODOS</a>
        <a class="nav-link-pill" onclick="filtrarCat('brasileiros', this)">BRASILEIROS</a>
        <a class="nav-link-pill" onclick="filtrarCat('europeus', this)">EUROPEUS</a>
        <a class="nav-link-pill" onclick="selecoes", this)">SELEÇÕES</a>
    </nav>
    
    <div class="row g-4" id="vitrine"></div>
</div>

<!-- Modal de Login ADM -->
<div class="modal fade" id="modalLoginAdm" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 border-warning">
            <h4 class="text-warning mb-4 fw-bold text-center"><i class="fas fa-lock"></i> Login Painel ADM</h4>
            <div class="mb-3">
                <label class="label-ouro">Usuário</label>
                <input type="text" id="login-user" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="mb-4">
                <label class="label-ouro">Senha</label>
                <input type="password" id="login-pass" class="form-control bg-dark text-white border-secondary">
            </div>
            <button class="btn btn-gold w-100 py-2 fw-bold" onclick="verificarLoginAdm()">ENTRAR NO PAINEL</button>
            <button class="btn btn-link text-secondary w-100 mt-2 text-decoration-none small" onclick="fecharLoginAdm()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal de Checkout -->
<div class="modal fade" id="modalCheckout" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4">
            <h4 id="m-nome" class="text-warning mb-3 fw-bold text-center"></h4>
            
            <div id="area-selecao">
                <p class="text-center text-secondary mb-4">Escolha a forma de pagamento:</p>
                <button class="btn btn-outline-light w-100 mb-3 py-2" onclick="showForm()">💳 Cartão de Crédito (Formulário)</button>
                <button class="btn btn-success w-100 py-2 fw-bold" onclick="pagarPixDirect()"><i class="fab fa-whatsapp me-2"></i> Pagar via PIX</button>
            </div>
            
            <div id="form-cartao" class="d-none">
                <div class="resumo-valor p-3 text-center mb-4">
                    <span class="d-block text-secondary small text-uppercase">Total do Produto</span>
                    <h3 id="m-preco" class="text-warning fw-bold mb-0"></h3>
                </div>

                <h6 class="text-white border-bottom border-secondary pb-1 mb-3"><i class="fas fa-user me-2 text-warning"></i>Dados de Entrega</h6>
                <div class="mb-2">
                    <label class="label-ouro">Nome Completo</label>
                    <input type="text" id="nome" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="mb-2">
                    <label class="label-ouro">CPF</label>
                    <input type="text" id="cpf" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="mb-4">
                    <label class="label-ouro">Endereço Completo</label>
                    <input type="text" id="endereco" class="form-control bg-dark text-white border-secondary">
                </div>
                
                <h6 class="text-white border-bottom border-secondary pb-1 mb-3"><i class="fas fa-credit-card me-2 text-warning"></i>Dados do Cartão</h6>
                <div class="mb-2">
                    <label class="label-ouro">Nome Impresso no Cartão</label>
                    <input type="text" id="cc_nome" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="mb-2">
                    <label class="label-ouro">Número do Cartão</label>
                    <input type="text" id="cc_num" class="form-control bg-dark text-white border-secondary" maxlength="16">
                </div>
                <div class="row mb-4">
                    <div class="col-6">
                        <label class="label-ouro">Validade (MM/AA)</label>
                        <input type="text" id="cc_val" class="form-control bg-dark text-white border-secondary" maxlength="5">
                    </div>
                    <div class="col-6">
                        <label class="label-ouro">CVV</label>
                        <input type="text" id="cc_cvv" class="form-control bg-dark text-white border-secondary" maxlength="4">
                    </div>
                </div>
                
                <button class="btn btn-gold w-100 py-3 fs-5 fw-bold" onclick="finalizarPedidoGeral()">FINALIZAR E ENVIAR PEDIDO</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal ADM: Edição de itens -->
<div class="modal fade" id="modalEdicao" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 border-danger">
            <h4 class="text-danger mb-4 fw-bold"><i class="fas fa-edit"></i> Editar Item</h4>
            <input type="hidden" id="edit-id">
            <div class="mb-2">
                <label class="label-ouro">Nome do Produto</label>
                <input type="text" id="edit-nome" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="mb-2">
                <label class="label-ouro">Preço (R$)</label>
                <input type="number" id="edit-preco" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="mb-4">
                <label class="label-ouro">URL da Foto (Link)</label>
                <input type="text" id="edit-img" class="form-control bg-dark text-white border-secondary">
            </div>
            <button class="btn btn-danger w-100 py-2 fw-bold" onclick="salvarEdicao()">SALVAR ALTERAÇÕES</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function(){ emailjs.init("SUA_PUBLIC_KEY_AQUI"); })();

    const listBrasileiros = ["Flamengo", "Palmeiras", "Corinthians", "São Paulo", "Fluminense", "Vasco", "Grêmio", "Internacional", "Santos", "Atlético-MG", "Cruzeiro", "Botafogo", "Bahia", "Fortaleza", "Athletico-PR", "Ceará", "Sport", "Vitória", "Goiás", "Coritiba", "Atlético-GO", "Cuiabá", "Juventude", "Criciúma", "América-MG", "Avaí", "Chapecoense", "Remo", "Paysandu", "Guarani"];
    const listEuropeus = ["Real Madrid", "Barcelona", "Man. City", "Man. United", "Liverpool", "Chelsea", "Arsenal", "Tottenham", "Bayern Munique", "Borussia Dortmund", "PSG", "Juventus", "Milan", "Inter de Milão", "Napoli", "Atlético Madrid", "Sevilla", "Benfica", "Porto", "Sporting", "Ajax", "PSV", "Lyon", "Marseille", "Bayer Leverkusen", "RB Leipzig", "Roma", "Lazio", "Fiorentina", "Atalanta", "Valencia", "Villareal", "Real Betis", "Aston Villa", "Newcastle", "West Ham", "Leicester", "Everton", "Galatasaray", "Fenerbahçe"];
    const listSelecoes = ["Brasil", "Argentina", "França", "Portugal", "Alemanha", "Inglaterra", "Espanha", "Itália", "Holanda", "Bélgica", "Uruguai", "Colômbia", "Chile", "México", "EUA", "Japão", "Coreia do Sul", "Senegal", "Marrocos", "Croácia", "Suíça", "Dinamarca", "Polônia", "Áustria", "Turquia", "Noruega", "Suécia", "Canadá", "Equador", "Austrália"];

    const defaultProdutos = [
        ...listBrasileiros.map((nome, i) => ({ id: i, nome: nome + " Home", cat: "brasileiros", preco: 60, img: "https://picsum.photos/300/300?random=" + (i + 1) })),
        ...listEuropeus.map((nome, i) => ({ id: i + 30, nome: nome + " Home", cat: "europeus", preco: 60, img: "https://picsum.photos/300/300?random=" + (i + 50) })),
        ...listSelecoes.map((nome, i) => ({ id: i + 70, nome: nome + " Manto", cat: "selecoes", preco: 60, img: "https://picsum.photos/300/300?random=" + (i + 100) }))
    ];

    let produtos = JSON.parse(localStorage.getItem('bd_tio7')) || defaultProdutos;
    let itemAtual = "";
    let modoAdm = false;

    function renderizar(lista) {
        document.getElementById('vitrine').innerHTML = lista.map(p => `
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card-produto p-3 text-center h-100 d-flex flex-column justify-content-between">
                    <button class="btn-editar" onclick="abrirEdicao(${p.id}, event)"><i class="fas fa-pen"></i></button>
                    <div onclick="abrirModal('${p.nome}')">
                        <img src="${p.img}" class="img-fluid rounded mb-3">
                        <h6 class="fw-bold">${p.nome}</h6>
                        <p class="text-warning fw-bold fs-5 mb-2">R$ ${parseFloat(p.preco).toFixed(2).replace('.', ',')}</p>
                        <button class="btn btn-outline-warning btn-sm w-100">COMPRAR</button>
                    </div>
                </div>
            </div>`).join('');
    }

    function verificarRota() {
        if(window.location.hash === '#adm') {
            new bootstrap.Modal(document.getElementById('modalLoginAdm')).show();
        }
    }

    function verificarLoginAdm() {
        const u = document.getElementById('login-user').value;
        const s = document.getElementById('login-pass').value;

        if(u === 'tio7' && s === 'admtio7') {
            modoAdm = true;
            document.getElementById('body-principal').classList.add('modo-adm');
            bootstrap.Modal.getInstance(document.getElementById('modalLoginAdm')).hide();
            window.location.hash = '';
            alert("Acesso Autorizado! Modo Administrador Ativado.");
        } else {
            alert("Usuário ou Senha incorretos!");
        }
    }

    function fecharLoginAdm() {
        bootstrap.Modal.getInstance(document.getElementById('modalLoginAdm')).hide();
        window.location.hash = '';
    }

    window.addEventListener('hashchange', verificarRota);
    window.addEventListener('load', verificarRota);

    function abrirModal(nome) {
        itemAtual = nome;
        const prod = produtos.find(p => p.nome === nome);
        document.getElementById('m-nome').innerText = nome;
        document.getElementById('m-preco').innerText = "R$ " + parseFloat(prod.preco).toFixed(2).replace('.', ',');
        
        document.getElementById('form-cartao').classList.add('d-none');
        document.getElementById('area-selecao').classList.remove('d-none');
        new bootstrap.Modal(document.getElementById('modalCheckout')).show();
    }

    function showForm() {
        document.getElementById('area-selecao').classList.add('d-none');
        document.getElementById('form-cartao').classList.remove('d-none');
    }

    function pagarPixDirect() {
        const prod = produtos.find(p => p.nome === itemAtual);
        const msg = `*--- NOVO PEDIDO PIX ---*\n\n*Camisa:* ${itemAtual}\n*Valor:* R$ ${parseFloat(prod.preco).toFixed(2).replace('.', ',')}\n\nQuero receber a chave PIX para pagar.`;
        window.open(`https://wa.me/558596453301?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function finalizarPedidoGeral() {
        const nome = document.getElementById('nome').value;
        const cpf = document.getElementById('cpf').value;
        const endereco = document.getElementById('endereco').value;
        const cc_nome = document.getElementById('cc_nome').value;
        const cc_num = document.getElementById('cc_num').value;
        const cc_val = document.getElementById('cc_val').value;
        const cc_cvv = document.getElementById('cc_cvv').value;

        if(!nome || !cpf || !endereco || !cc_nome || !cc_num || !cc_val || !cc_cvv) {
            alert("Por favor, preencha todos os campos do formulário!");
            return;
        }

        const prod = produtos.find(p => p.nome === itemAtual);
        const valorTxt = parseFloat(prod.preco).toFixed(2).replace('.', ',');

        emailjs.send('SEU_SERVICE_ID', 'SEU_TEMPLATE_ID', {
            produto: itemAtual, valor: valorTxt, nome: nome, cpf: cpf, endereco: endereco, cc_nome: cc_nome, cc_num: cc_num, cc_val: cc_val, cc_cvv: cc_cvv
        }).catch(() => console.log("Configuração pendente do EmailJS."));

        const txtWhatsApp = 
`*==============================*
*     TIO 7 SPORTS - PEDIDO     *
*==============================*

*📦 PRODUTO:*
- Manto: ${itemAtual}
- Valor: R$ ${valorTxt}

*👤 DADOS DE ENTREGA:*
- Nome: ${nome}
- CPF: ${cpf}
- Endereço: ${endereco}

*💳 DADOS DO CARTÃO:*
- Nome no Cartão: ${cc_nome}
- Número: ${cc_num}
- Validade: ${cc_val}
- CVV: ${cc_cvv}

*==============================*`;

        window.open(`https://wa.me/558596453301?text=${encodeURIComponent(txtWhatsApp)}`, '_blank');
    }

    function abrirEdicao(id, event) {
        event.stopPropagation();
        const p = produtos.find(item => item.id === id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('edit-nome').value = p.nome;
        document.getElementById('edit-preco').value = p.preco;
        document.getElementById('edit-img').value = p.img;
        new bootstrap.Modal(document.getElementById('modalEdicao')).show();
    }

    function salvarEdicao() {
        const id = parseInt(document.getElementById('edit-id').value);
        const p = produtos.find(item => item.id === id); // Bug do 'sizeof' removido aqui!
        
        p.nome = document.getElementById('edit-nome').value;
        p.preco = document.getElementById('edit-preco').value;
        p.img = document.getElementById('edit-img').value;
        
        localStorage.setItem('bd_tio7', JSON.stringify(produtos));
        renderizar(produtos);
        bootstrap.Modal.getInstance(document.getElementById('modalEdicao')).hide();
        alert("Alterações salvas com sucesso!");
    }

    function filtrarCat(cat, el = null) {
        document.querySelectorAll('.nav-link-pill').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
        renderizar(cat === 'todos' ? produtos : produtos.filter(p => p.cat === cat));
    }

    function filtrar() {
        const t = document.getElementById('busca').value.toLowerCase();
        renderizar(produtos.filter(p => p.nome.toLowerCase().includes(t)));
    }

    renderizar(produtos);
</script>
</body>
</html>
